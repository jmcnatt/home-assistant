---
################################################################################
# Home Assistant Main Configuration
# https://www.home-assistant.io/docs/configuration/
################################################################################
homeassistant:
  country: 'US'
  currency: 'USD'
  customize: !include customizations/entities.yaml
  latitude: !secret home_latitude
  longitude: !secret home_longitude
  name: !secret home_name
  radius: 25
  time_zone: !secret home_timezone
  unit_system: us_customary
################################################################################
# Core Components (non-default)
# https://www.home-assistant.io/integrations/default_config/
################################################################################
automation: !include automations.yaml
automation split: !include_dir_merge_list automations/
cloud:
config:
frontend:
history:
http:
  use_x_forwarded_for: true
  trusted_proxies: !secret http_trusted_proxies
input_boolean: !include_dir_merge_named input_booleans/
input_button: !include_dir_merge_named input_button.yaml
input_datetime: !include_dir_merge_named input_datetimes/
input_number: !include_dir_merge_named input_numbers/
input_select: !include_dir_merge_named input_selects/
input_text:
logbook:
lovelace:
  mode: storage
media_source:
mobile_app:
my:
person:
recorder: !include recorder.yaml
scene:
ssdp:
stream:
sun:
system_health:
tag:
zeroconf:
zone:
################################################################################
# Other Integrations
################################################################################
climate: !include_dir_merge_list climates/
light: !include lights.yaml
notify:
  - name: all_mobile_devices
    platform: group
    services:
      - action: mobile_app_five_mega_pixel
      - action: mobile_app_chirp
rest: !include rest.yaml
script: !include scripts.yaml
script split: !include_dir_merge_named scripts/
template: !include_dir_merge_list templates/
tts:
  - platform: google_translate

---
################################################################################
# Bedroom 1 air purifier auto starts at the value of
# `input_datetime.bedroom_1_air_purifier_auto_start_time`
#
# Requires at least one person in the home zone
#
# https://www.home-assistant.io/docs/automation/yaml/
################################################################################
- id: bedroom_1_air_purifier_auto_start
  alias: Bedroom 1 Air Purifier Auto Start
  description: >
    Automatically starts the bedroom 1 air purifier based on the value of the
    start time helper
  mode: single

  triggers:
    - trigger: time
      at: input_datetime.bedroom_1_air_purifier_auto_start_time

  conditions:
    - condition: and
      conditions:
        - condition: numeric_state
          entity_id: zone.home
          above: 0
        - condition: state
          entity_id: switch.bedroom_1_air_purifier
          state: 'off'

  actions:
    - action: switch.turn_on
      target:
        entity_id: switch.bedroom_1_air_purifier

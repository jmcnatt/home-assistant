---
################################################################################
# Hallway Lights Turn On When Someone Arrives at Home After Dusk
# https://www.home-assistant.io/docs/automation/yaml/
################################################################################
- id: '1643675363387'
  alias: Hallway Lights On When Someone Arrives
  description: >
    Turns on the hallway lights when noone is home and someone arrives
  mode: single

  triggers:
    - trigger: state
      entity_id:
        - zone.home
      from: '0'

  conditions:
    - condition: template
      value_template: "{{ state_attr('sun.sun', 'elevation') < 20 }}"

  actions:
    - if:
        - condition: state
          entity_id: light.bar_light
          state: "off"
      then:
        - service: light.turn_on
          target:
            entity_id: light.bar_light
          data:
            brightness_pct: 75

    - if:
        - condition: state
          entity_id: light.hallway_lower_lights
          state: "off"
      then:
        - service: light.turn_on
          target:
            entity_id: light.hallway_lower_lights

    - if:
        - condition: state
          entity_id: light.kitchen_scene_controller
          state: "off"
      then:
        - service: light.turn_on
          target:
            entity_id: light.kitchen_scene_controller
          data:
            brightness_pct: 50

---
################################################################################
# Notifies the all_mobile_devices group when it is a certain time of day and
# the laundry room washer cycle has completed and the door has not been opened
#
# The time of this trigger can be set with 
# input_datetime.laundry_room_washer_notification_on_not_empty
#
# https://www.home-assistant.io/docs/automation/yaml/
################################################################################
- id: laundry_room_washer_notification_on_not_empty
  alias: Laundry Room Washer Notification On Not Empty
  description: >
    Notifies the all_mobile_devices group when it is a certain time of day and
    the laundry room washer cycle has completed and the door has not been opened
  mode: single

  triggers:
    - trigger: time
      at: input_datetime.laundry_room_washer_notification_on_not_empty
  
  actions:
    - action: notify.all_mobile_devices
      data:
        title: Washer Still Full
        message: >
          Moving laundry to the dryer helps keep clothes fresh
          and prevents mildew

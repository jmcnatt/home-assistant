---
################################################################################
# Updates the last completed datetime when the `laundry_room` washer finishes
#
# https://www.home-assistant.io/docs/automation/yaml/
################################################################################
- id: laundry_room_washer_last_run_completed
  alias: Laundry Room Washer Last Run Completed
  description: >
    Updates the last completed datetime when the laundry room washer finishes
  mode: single

  triggers:
    - trigger: numeric_state
      entity_id: sensor.washer_plug_washer_power
      below: 6
      for:
        minutes: 2

  conditions:
    - condition: template
      value_template: >
        {{ states('input_boolean.laundry_room_washer_running') == 'on' }}

  actions:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.laundry_room_washer_last_run_completed
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.laundry_room_washer_running

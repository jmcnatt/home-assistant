---
################################################################################
# HVAC Filter Notification When Replacement Needed
#
# Notifies when the filter needs to be changed in 7 days, and then every
# additional 7 days afterwards until the filter is changed
#
# https://www.home-assistant.io/docs/automation/yaml/
################################################################################
- id: hvac_filter_notify
  alias: HVAC Filter Notification When Replacement Needed
  description: >
    Notifies when the HVAC filter needs to be changed
  mode: single

  trigger:
    - platform: time
      at: 09:00:00

  conditions:
    - condition: numeric_state
      entity_id: sensor.hvac_filter_days_remaining
      below: 8
    - condition: template
      value_template: "{{ (states('sensor.hvac_filter_days_remaining') | int) % 7 == 0 }}"

  action:
    - service: notify.discord
      data:
        target:
          - '1448208998255034520'
        message: >
          :window: The HVAC filter needs to be changed in **{{ states.sensor.hvac_filter_days_remaining.state
          }} days**.

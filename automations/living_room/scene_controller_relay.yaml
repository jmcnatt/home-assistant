---
################################################################################
# Living Room Scene Controller Relay
# https://www.home-assistant.io/docs/automation/yaml/
################################################################################
- id: '1770762427937'
  alias: Living Room Scene Controller Relay
  description: >
    Syncs the living_room_scene_controller relay with the smart
    bulb light.living_room_lamp
  mode: single

  triggers:
    - trigger: state
      entity_id: light.living_room_scene_controller

  conditions: []

  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ trigger.to_state.state == 'on' }}
          sequence:
            - if:
                - condition: state
                  entity_id: light.living_room_lamp
                  state: "off"
              then:
                - service: light.turn_on
                  target:
                    entity_id: light.living_room_lamp
      
        - conditions:
            - condition: template
              value_template: >
                {{ trigger.to_state.state == 'off' }}
          sequence:
            - if:
                - condition: state
                  entity_id: light.living_room_lamp
                  state: "on"
              then:
                - service: light.turn_off
                  target:
                    entity_id: light.living_room_lamp

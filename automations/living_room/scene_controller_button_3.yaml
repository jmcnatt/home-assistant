---
################################################################################
# Living Room Scene Controller Button 3
# https://www.home-assistant.io/docs/automation/yaml/
################################################################################
- id: '1771793669130'
  alias: Living Room Scene Controller Button 3
  description: >
    Syncs the living_room_scene_controller button 3 with the living_room
    fireplace controls
  mode: single

  variables:
    flame_state: >
      {{ states('switch.living_room_fireplace_flame') }}
    fan_state: >
      {{ states('switch.living_room_fireplace_fan') }}

  triggers:
    - trigger: event
      event_type: zwave_js_value_notification
      event_data:
        device_id: 4731b628f236657a7a89933eb4a870ad
        property: scene
        property_key: "003"

  conditions: []

  actions:
    - choose:
        # Press and hold toggles the flame, and if the flame turns off, turns off the fan
        - conditions:
            - condition: template
              value_template: >
                {{ trigger.event.data.value == 'KeyHeldDown' }}
          sequence:
            - choose:
                - conditions:
                    - condition: template
                      value_template: >
                        {{ flame_state == 'off' }}
                  sequence:
                    - service: switch.turn_on
                      target:
                        entity_id: switch.living_room_fireplace_flame
                - conditions:
                    - condition: template
                      value_template: >
                        {{ flame_state == 'on' }}
                  sequence:
                    - choose:
                        - conditions:
                            - condition: template
                              value_template: >
                                {{ fan_state == 'on' }}
                          sequence:
                            - service: switch.turn_off
                              target:
                                entity_id: switch.living_room_fireplace_fan
                    - service: switch.turn_off
                      target:
                        entity_id: switch.living_room_fireplace_flame

        # Double tap toggles the fan and if the fan turns off, turns off the flame
        - conditions:
            - condition: template
              value_template: >
                {{ trigger.event.data.value == 'KeyPressed2x' }}
          sequence:
            - choose:
                - conditions:
                    - condition: template
                      value_template: >
                        {{ fan_state == 'off' }}
                  sequence:
                    - choose:
                        - conditions:
                            - condition: template
                              value_template: >
                                {{ flame_state == 'off' }}
                          sequence:
                            - service: switch.turn_on
                              target:
                                entity_id: switch.living_room_fireplace_flame
                    - service: switch.turn_on
                      target:
                        entity_id: switch.living_room_fireplace_fan
                - conditions:
                    - condition: template
                      value_template: >
                        {{ fan_state == 'on' }}
                  sequence:
                    - service: switch.turn_off
                      target:
                        entity_id: switch.living_room_fireplace_fan

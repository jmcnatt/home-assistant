---
################################################################################
# Sets the hvac filter installed date to today
# https://www.home-assistant.io/integrations/script/
################################################################################
hvac_filter_install_date_reset:
  alias: HVAC Filter Install Date Reset
  description: >
    Sets the hvac filter installed date to today

  sequence:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.hvac_filter_install_date
      data:
        date: '{{ as_timestamp(now()) | timestamp_custom(''%Y-%m-%d'') }}'

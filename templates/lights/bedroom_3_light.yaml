---
################################################################################
# Template for bedroom 3 light
# https://www.home-assistant.io/integrations/template/#light
################################################################################
- light:
    - name: Bedroom 3 Light
      unique_id: bedroom_3_light
      icon: mdi:dome-light
      availability: "{{ has_value('switch.bedroom_3_light') }}"
      state: "{{ is_state('switch.bedroom_3_light', 'on') }}"
      turn_on:
        - action: switch.turn_on
          target:
            entity_id: switch.bedroom_3_light
      turn_off:
        - action: switch.turn_off
          target:
            entity_id: switch.bedroom_3_light

---
################################################################################
# Template for Hallway Lower Lights
# https://www.home-assistant.io/integrations/template/#light
################################################################################
- light:
    - name: Hallway Lower Lights
      unique_id: "light.hallway_lower_lights"
      icon: mdi:light-recessed
      availability: "{{ has_value('switch.hallway_lower_lights') }}"
      state: "{{ is_state('switch.hallway_lower_lights', 'on') }}"
      turn_on:
        - action: switch.turn_on
          target:
            entity_id: switch.hallway_lower_lights
      turn_off:
        - action: switch.turn_off
          target:
            entity_id: switch.hallway_lower_lights

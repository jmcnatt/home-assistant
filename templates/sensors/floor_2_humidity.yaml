---
################################################################################
# Template for floor 2 humidity
#
# Used to average all temperature sensors and provide a reasonable value
# for normal virtual thermostat operation
#
# https://www.home-assistant.io/integrations/template/#sensor
################################################################################
- sensor:
    - name: "Floor 2 Humidity"
      unit_of_measurement: "%"
      state: >
        {% set entities = expand(
          'sensor.bedroom_1_htg3_humidity',
          'sensor.bedroom_2_htg3_humidity',
          'sensor.bedroom_3_htg3_humidity'
        ) %}

        {% set values = entities
          | selectattr('state', 'is_number')
          | map(attribute='state')
          | map('float')
          | list
        %}

        {{ (values | average | round(1)) if values else none }}

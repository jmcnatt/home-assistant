---
################################################################################
# Template for the number of days remaining before the hvac filter needs to be
# changed
# https://www.home-assistant.io/integrations/template/#sensor
################################################################################
- sensor:
    name: HVAC Filter Days Remaining
    unique_id: hvac_filter_days_remaining
    unit_of_measurement: days
    icon: mdi:calendar-clock
    state: >
      {% set installed = as_timestamp(states('input_datetime.hvac_filter_install_date')) %}
      {% set lifespan = states('input_number.hvac_filter_lifespan') | int * 86400 %}
      {% set now = as_timestamp(states('sensor.date')) %}
      {{ (((installed + lifespan) - now) / 86400) | round(0) }}

---
################################################################################
# Template for floor 2 temperature
#
# Used to average all temperature sensors and provide a reasonable value
# for normal virtual thermostat use
#
# https://www.home-assistant.io/integrations/template/#sensor
################################################################################
- sensor:
    - name: "Floor 2 Temperature"
      unit_of_measurement: "°F"
      state: >
        {% set entities = expand(
          'sensor.bedroom_1_htg3_temperature',
          'sensor.bedroom_2_htg3_temperature',
          'sensor.bedroom_3_htg3_temperature'
        ) %}

        {% set values = entities
          | selectattr('state', 'is_number')
          | map(attribute='state')
          | map('float')
          | list
        %}

        {{ (values | average | round(1)) if values else none }}

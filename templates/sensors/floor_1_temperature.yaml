---
################################################################################
# Template for floor 1 temperature
#
# Used to average all temperature sensors and provide a reasonable value
# for normal virtual thermostat use
#
# https://www.home-assistant.io/integrations/template/#sensor
################################################################################
- sensor:
    - name: "Floor 1 Temperature"
      unique_id: floor_1_temperature
      unit_of_measurement: "°F"
      icon: mdi:thermometer
      state: >
        {% set entities = expand(
          'sensor.living_room_thermostat_air_temperature'
        ) %}

        {% set values = entities
          | selectattr('state', 'is_number')
          | map(attribute='state')
          | map('float')
          | list
        %}

        {{ (values | average | round(1)) if values else none }}
